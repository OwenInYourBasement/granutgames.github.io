        .logo {
            max-width: 550px;
            width: 90%;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 30px rgba(57,255,20,0.3)) drop-shadow(0 0 60px rgba(255,26,26,0.2));

            position: relative;
            z-index: 2;
        }

            position: fixed;
            bottom: 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            z-index: 2;
        }

        @keyframes logoFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* DVD bouncing capsule */
        .dvd-bounce {
            position: fixed;
            width: 150px;
            z-index: 1;
            cursor: pointer;
            transition: filter 0.15s;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .dvd-bounce:hover {
            filter: brightness(1.2) drop-shadow(0 0 15px rgba(255,231,68,0.6));
            transform: scale(1.05);
        }

        .dvd-bounce:active {
            transform: scale(0.95);
        }

    <script>
        const dvd = document.getElementById('dvd');
        let x = Math.random() * (window.innerWidth - 150);
        let y = Math.random() * (window.innerHeight - 180);
        let dx = 2;
        let dy = 2;
        const speed = 2;

        // Random starting direction
        dx = (Math.random() > 0.5 ? 1 : -1) * speed;
        dy = (Math.random() > 0.5 ? 1 : -1) * speed;

        dvd.style.position = 'fixed';
        dvd.style.left = x + 'px';
        dvd.style.top = y + 'px';

        function animate() {
            const w = dvd.offsetWidth;
            const h = dvd.offsetHeight;
            const maxX = window.innerWidth - w;
            const maxY = window.innerHeight - h;

            x += dx;
            y += dy;

            if (x <= 0 || x >= maxX) {
                dx = -dx;
                x = Math.max(0, Math.min(x, maxX));
            }
            if (y <= 0 || y >= maxY) {
                dy = -dy;
                y = Math.max(0, Math.min(y, maxY));
            }

            dvd.style.left = x + 'px';
            dvd.style.top = y + 'px';

            requestAnimationFrame(animate);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            x = Math.min(x, window.innerWidth - dvd.offsetWidth);
            y = Math.min(y, window.innerHeight - dvd.offsetHeight);
        });
    </script>
